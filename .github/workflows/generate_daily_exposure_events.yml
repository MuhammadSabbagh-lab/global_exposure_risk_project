name: Generate Daily Exposure Events

on:
schedule:
-cron:"0 7 * * *"
workflow_dispatch:

permissions:
contents: write

jobs:
generate-data:
runs-on: ubuntu-latest

steps:
-name: Checkout repo
uses: actions/checkout@v4

-name: Set up Python
uses: actions/setup-python@v5
with:
python-version:"3.11"

-name: Install pandas
run: pip install pandas

-name: Generate new exposure events
run: python scripts/generate_daily_exposure_events.py

-name: Commit generated files
        run:|
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add source_data/
          git commit -m "Generate daily exposure events" || echo "No changes to commit"
          git push